<!doctype html>
<html lang="en">
<head>

  <title>CodeMike — DES-001 Design Foundations v2</title>
  <link rel="stylesheet" href="design-foundations-app/styles.css" />
</head>
<body>
  <header class="shell hero" id="app-hero"></header>

  <main class="shell">

    <section class="rule-grid" id="app-rules" aria-label="Assignment rules"></section>

      <h2>12-topic curriculum</h2>
