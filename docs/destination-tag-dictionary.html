<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CodeMike Destination Tag Dictionary</title>
  <style>
    :root { --bg:#f7f7f3; --panel:#fff; --text:#171717; --muted:#666; --line:#deded7; --chip:#eeeee7; --accent:#2f5d50; --shadow:0 10px 30px rgba(0,0,0,.08); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    header { padding:30px 24px 18px; border-bottom:1px solid var(--line); background:linear-gradient(135deg,#fff 0%,#f2f1e9 100%); }
    h1 { margin:0 0 8px; font-size:clamp(28px,5vw,48px); letter-spacing:-.05em; }
    .subtitle { max-width:1000px; color:var(--muted); line-height:1.55; font-size:15px; }
    main { padding:22px 24px 44px; }
    .summary { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:14px; margin-bottom:18px; }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); }
    .stat .value { font-size:30px; font-weight:800; letter-spacing:-.04em; }
    .stat .label { color:var(--muted); font-size:12px; margin-top:2px; }
    .controls { display:grid; grid-template-columns:1.4fr 1fr 1fr; gap:12px; background:var(--panel); border:1px solid var(--line); padding:14px; border-radius:20px; box-shadow:var(--shadow); position:sticky; top:0; z-index:2; margin-bottom:18px; }
    input, select { width:100%; min-height:44px; border:1px solid var(--line); border-radius:14px; padding:0 12px; font-size:14px; background:#fff; color:var(--text); }
    .layout { display:grid; grid-template-columns:280px 1fr; gap:18px; align-items:start; }
    aside { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:16px; box-shadow:var(--shadow); position:sticky; top:88px; }
    aside h2 { margin:0 0 12px; font-size:16px; }
    .facet-row { display:flex; justify-content:space-between; gap:8px; padding:7px 0; border-bottom:1px solid #f0f0eb; font-size:13px; }
    .facet-row:last-child { border-bottom:0; }
    .count { color:var(--muted); font-variant-numeric:tabular-nums; }
    .grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:20px; padding:16px; box-shadow:var(--shadow); min-height:145px; display:flex; flex-direction:column; }
    .tag { font-size:18px; font-weight:800; letter-spacing:-.02em; margin-bottom:8px; }
    code { background:var(--chip); padding:3px 7px; border-radius:8px; }
    .meta { color:var(--muted); font-size:13px; line-height:1.45; }
    .pillrow { display:flex; flex-wrap:wrap; gap:6px; margin-top:auto; padding-top:12px; }
    .pill { background:var(--chip); border-radius:999px; padding:5px 8px; font-size:12px; color:#333; }
    .pill.group { background:#e7f4ed; color:#1f6b4d; }
    .empty { background:var(--panel); border:1px dashed var(--line); border-radius:20px; padding:28px; color:var(--muted); }
    @media (max-width:1100px){ .summary{grid-template-columns:repeat(2,minmax(0,1fr));} .controls{grid-template-columns:1fr;} .layout{grid-template-columns:1fr;} aside{position:static;} .grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media (max-width:700px){ main,header{padding-left:14px;padding-right:14px;} .summary,.grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>

  <h1>Destination Tag Dictionary</h1>

</header>
<main>
  <section class="summary" id="summary"></section>
  <section class="controls">
    <input id="search" placeholder="Search tags, groups, descriptions…" />
    <select id="category"><option value="">All categories</option></select>
    <select id="group"><option value="">All groups</option></select>
  </section>
  <section class="layout">
    <aside>
      <h2>Taxonomy coverage</h2>
      <div id="facets"></div>
    </aside>
    <section><div id="cards" class="grid"></div></section>
  </section>
</main>

function renderSummary(items){ const categories = unique(items.map(r=>r.category)).length; const groups = unique(items.map(r=>r.group)).length; const stats=[['Showing',items.length],['Total tags',rows.length],['Categories',categories],['Groups',groups],['Destination types',items.filter(r=>r.category==='destination_type').length]]; els.summary.innerHTML = stats.map(([label,value]) => `<div class="stat"><div class="value">${value}</div><div class="label">${label}</div></div>`).join(''); }
function renderFacets(items){ const entries=Object.entries(countBy(items,'category')).sort((a,b)=>b[1]-a[1]); els.facets.innerHTML = entries.map(([label,count]) => `<div class="facet-row"><span>${title(label)}</span><span class="count">${count}</span></div>`).join(''); }
function renderCards(items){ if(!items.length){ els.cards.className=''; els.cards.innerHTML='<div class="empty">No tags match the current filters.</div>'; return; } els.cards.className='grid'; els.cards.innerHTML = items.map(r => `<article class="card"><div class="tag"><code>${r.tag}</code></div><div class="meta">${r.description}</div><div class="pillrow"><span class="pill group">${title(r.category)}</span><span class="pill">${r.group}</span></div></article>`).join(''); }
function render(){ const items=filtered(); renderSummary(items); renderFacets(items); renderCards(items); }
[els.search, els.category, els.group].forEach(el => el.addEventListener('input', render));
render();
